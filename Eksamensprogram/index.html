

<!DOCTYPE html>
<html lang="da">
<head>


<title>Skak</title>

<style>

#board {
  display: grid;
  grid-template-columns: repeat(8, 60px);
  width: 480px;
}

.square {
  width: 60px;
  height: 60px;
  border: 1px solid black;
}

.dark {
  background-color: #7e5c19;
}

.light {
  background-color: #bc882e;
}

</style>

</head>
<body>

<div id="board"></div>

<button id="reset">Nyt spil</button>

<script type="module" src="main.js"></script>

</body>
</html>
